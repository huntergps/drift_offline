name: drift_offline
repository: https://github.com/yourorg/drift_offline

packages:
  - packages/*

command:
  version:
    linkToCommits: true

  bootstrap:
    runPubGetInParallel: false
    usePubspecOverrides: true

scripts:
  analyze:
    run: melos exec -- dart analyze .
    description: Run dart analyzer on all packages

  test:
    run: melos exec -- dart test
    description: Run tests for all packages

  format:
    run: melos exec -- dart format .
    description: Format all packages

  build:
    run: melos exec --depends-on="build_runner" -- dart run build_runner build --delete-conflicting-outputs
    description: Run build_runner on packages that use it
