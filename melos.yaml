name: drift_offline
repository: https://github.com/huntergps/drift_offline

packages:
  - packages/*
  - packages/drift_build

command:
  version:
    linkToCommits: true

  bootstrap:
    runPubGetInParallel: false
    usePubspecOverrides: true

scripts:
  analyze:
    run: >
      melos exec
      --ignore="drift_rest_generators"
      --ignore="drift_supabase_generators"
      --ignore="drift_offline_first_with_rest_build"
      --ignore="drift_offline_first_with_supabase_build"
      --ignore="drift_supabase"
      --ignore="drift_offline_first_with_supabase"
      --ignore="example_odoo_contacts"
      -- dart analyze .
    description: Run dart analyzer on stable packages (REST/Supabase generators, Supabase provider, and example app are WIP)

  test:
    run: melos exec -- dart test
    description: Run tests for all packages

  format:
    run: melos exec -- dart format .
    description: Format all packages

  build:
    run: melos exec --depends-on="build_runner" -- dart run build_runner build --delete-conflicting-outputs
    description: Run build_runner on packages that use it
