name: drift_rest
description: REST provider for Drift offline-first packages. Includes @Rest annotation, RestRequestTransformer, RestProvider, and RestException.
version: 0.1.0

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  brick_core: ">=1.0.0 <2.0.0"
  collection: ">=1.15.0 <2.0.0"
  drift_offline_first:
    path: ../drift_offline_first
  http: ">=1.0.0 <2.0.0"
  logging: ">=1.0.0 <2.0.0"
  meta: ">=1.3.0 <2.0.0"

dev_dependencies:
  lints:
  test:
