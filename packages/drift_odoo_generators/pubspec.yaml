version: 0.1.0

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  analyzer: ">=6.0.0 <10.0.0"
  brick_build: ">=4.0.0 <5.0.0"
  build: ">=2.0.0 <5.0.0"
