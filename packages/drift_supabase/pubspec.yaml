name: drift_supabase
description: Supabase provider for Drift offline-first packages. Includes annotations, offline queue, RuntimeSupabaseColumnDefinition, and SupabaseProvider.
version: 0.1.0

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  drift_offline_first:
    path: ../drift_offline_first
  brick_core: ">=1.0.0 <2.0.0"
  collection: ">=1.15.0 <2.0.0"
  http: ">=1.0.0 <2.0.0"
  logging: ">=1.0.0 <2.0.0"
  meta: ">=1.3.0 <2.0.0"
  sqflite_common: ">=2.5.0 <3.0.0"
  supabase: ">=2.0.0 <3.0.0"
  synchronized: ">=3.0.0 <4.0.0"

dev_dependencies:
  lints:
  sqflite_common_ffi:
  test:
