name: drift_offline_first_with_supabase
description: Offline-first repository integrating Drift with Supabase. Includes sync policies, realtime subscriptions, and HTTP offline queue.
version: 0.1.0

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  drift_offline_first:
    path: ../drift_offline_first
  drift_supabase:
    path: ../drift_supabase
  drift: ">=2.0.0 <3.0.0"
  http: ">=1.0.0 <2.0.0"
  logging: ">=1.0.0 <2.0.0"
  meta: ">=1.3.0 <2.0.0"
  supabase: ">=2.0.0 <3.0.0"

dev_dependencies:
  drift_dev: ">=2.0.0 <3.0.0"
  lints:
  test:
