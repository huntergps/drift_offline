name: drift_offline_first_with_odoo_build
description: Code generation builders for drift_offline_first_with_odoo. Generates fromOdoo/toOdoo adapters and model dictionaries.
version: 0.1.0
homepage: https://github.com/huntergps/drift_offline
repository: https://github.com/huntergps/drift_offline
issue_tracker: https://github.com/huntergps/drift_offline/issues
# publish_to: none — path: dependencies must be replaced with version refs before publishing.
publish_to: none

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  analyzer: ">=6.0.0 <9.0.0"
  drift_build:
    path: ../drift_build
  build: ">=2.0.0 <5.0.0"
  dart_style: ">=2.0.0 <3.0.0"
  drift_odoo_core:
    path: ../drift_odoo_core
  drift_odoo_generators:
    path: ../drift_odoo_generators
  drift_offline_first:
    path: ../drift_offline_first
  drift_offline_first_with_odoo:
    path: ../drift_offline_first_with_odoo
  logging: ">=1.0.0 <2.0.0"
  meta: ">=1.3.0 <2.0.0"
  source_gen: ">=1.0.0 <4.0.0"

dev_dependencies:
  build_test: ">=2.0.0 <4.0.0"
  lints:
  test: ">=1.24.0 <2.0.0"
