name: drift_rest_generators
description: Code generators for drift_rest. Produces fromRest/toRest adapters and restModelDictionary.
version: 0.1.0

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  analyzer: ">=6.0.0 <8.0.0"
  brick_build: ">=3.0.0 <4.0.0"
  brick_core: ">=1.0.0 <2.0.0"
  brick_json_generators: ">=3.0.0 <4.0.0"
  build: ">=2.0.0 <3.0.0"
  dart_style: ">=2.0.0 <3.0.0"
  drift_rest:
    path: ../drift_rest
  source_gen: ">=1.0.0 <2.0.0"

dev_dependencies:
  lints:
  test:
