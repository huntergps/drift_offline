name: drift_build
description: Code generation infrastructure for drift_offline packages. Replaces brick_build with no external framework dependency.
version: 0.1.0

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  analyzer: ">=6.0.0 <10.0.0"
  brick_core: ">=1.0.0 <2.0.0" # FieldSerializable, FieldRename — lightweight data-only types
  build: ">=2.0.0 <5.0.0"
  collection: ">=1.15.0 <2.0.0"
  dart_style: ">=2.0.0 <4.0.0"
  meta: ">=1.3.0 <2.0.0"
  source_gen: ">=1.0.0 <5.0.0"

dev_dependencies:
  lints:
