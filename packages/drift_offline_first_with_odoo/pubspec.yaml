name: drift_offline_first_with_odoo
description: Offline-first repository integrating Drift with the Odoo JSON-2 API. Includes sync policies and incremental hydration.
version: 0.1.0
homepage: https://github.com/huntergps/drift_offline
repository: https://github.com/huntergps/drift_offline
issue_tracker: https://github.com/huntergps/drift_offline/issues
# publish_to: none — path: dependencies must be replaced with version refs before publishing.
publish_to: none

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  drift_odoo_core:
    path: ../drift_odoo_core
  drift_odoo:
    path: ../drift_odoo
  drift_offline_first:
    path: ../drift_offline_first
  collection: ">=1.15.0 <2.0.0"
  drift: ">=2.0.0 <3.0.0"
  http: ">=1.0.0 <2.0.0"
  logging: ">=1.0.0 <2.0.0"
  meta: ">=1.3.0 <2.0.0"
  synchronized: ">=3.0.0 <4.0.0"

dev_dependencies:
  drift_dev: ">=2.0.0 <3.0.0"
  lints:
  sqflite_common_ffi: ">=2.3.0 <3.0.0"
  test: ">=1.24.0 <2.0.0"
